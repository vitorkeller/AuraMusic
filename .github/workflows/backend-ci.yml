name: Backend CI (Java Spring Boot)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Dar permissão para executar o Maven
      run: chmod +x ./backend/mvnw

    - name: Rodar os Testes Unitários (TDD)
      run: cd backend && ./mvnw clean test
