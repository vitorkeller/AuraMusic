# Manda o Spring importar as variáveis do outro arquivo
spring.config.import=optional:classpath:application-env.properties

# Nome da aplicação
spring.application.name=backend

# Configuração PostgreSQL (Supabase) via Variáveis de Ambiente
spring.datasource.url=${AURA_DB_URL}
spring.datasource.username=${AURA_DB_USER}
spring.datasource.password=${AURA_DB_PASS}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=8080
server.address=0.0.0.0
